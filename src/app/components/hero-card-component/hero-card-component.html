<div class="card" [style.background-color]="hero.completata ? 'lightgreen'
: 'white'">
    <h3>{{ hero.nome }}</h3>
    <p>Potere: {{ hero.potere }}</p>
    <button (click)="markAsDone()" [disabled]="hero.completata">
        Missione Compiuta
    </button>
    <button (click)="selectHero()">
        select hero
    </button>
</div>
